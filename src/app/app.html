<header class="cabecera">
  <div class="cabecera__interior">
    <a routerLink="/" class="cabecera__marca" aria-label="Inicio Taracea">
      <img src="/logos/taracea-berenjena.png" alt="" class="cabecera__logo" />
      <span class="cabecera__subtitulo">Ciclo de vida del diseño de interfaces</span>
    </a>
  </div>

  <nav class="pestanas" aria-label="Etapas del ciclo de diseño">
    <ul class="pestanas__lista">
      @for (etapa of etapas; track etapa.numero) {
        <li class="pestanas__item">
          <a
            [routerLink]="etapa.ruta"
            routerLinkActive="pestanas__enlace--activo"
            class="pestanas__enlace"
          >
            <span class="pestanas__numero">{{ etapa.numero }}</span>
            <span class="pestanas__titulo">{{ etapa.titulo }}</span>
          </a>
        </li>
      }
    </ul>
  </nav>
</header>

<main class="contenido">
  <div class="contenido__interior">
    <router-outlet />
  </div>
</main>

<footer class="pie">
  <p>Proyecto académico · Caso de estudio Taracea</p>
</footer>
